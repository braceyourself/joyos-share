<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>JoyOS</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script type="module" src="/src/main.ts"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary-color: #039FB2;
      --accent-color: #CBA951;
      --bg-dark: #0C1320;
      --bg-light: #F7F4EE;
      --text-color: #E8E4DC;
      --text-muted: rgba(247, 244, 238, 0.45);
      --font-family: 'Sora', sans-serif;
      --border-radius: 10px;
      --border-color: rgba(247, 244, 238, 0.08);
      --card-bg: #111827;
    }

    body {
      font-family: var(--font-family);
      background: var(--bg-dark);
      color: var(--text-color);
      min-height: 100vh;
    }

    /* Auth gate */
    .auth-gate {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-dark);
    }

    .auth-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 2.5rem;
      background: var(--card-bg);
      border: 1px solid rgba(3, 159, 178, 0.2);
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
      max-width: 380px;
      width: 90vw;
    }

    .auth-title {
      font-size: 1.15rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      color: var(--primary-color);
      margin-bottom: 0.5rem;
    }

    .auth-sub {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 1.75rem;
      text-align: center;
      line-height: 1.5;
    }

    .auth-btn {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0.7rem 1.4rem;
      background: var(--bg-light);
      border: none;
      border-radius: 8px;
      font-family: var(--font-family);
      font-size: 0.85rem;
      font-weight: 500;
      color: #1A2332;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      width: 100%;
      justify-content: center;
    }

    .auth-btn:hover { background: #fff; box-shadow: 0 2px 12px rgba(3, 159, 178, 0.2); transform: translateY(-1px); }
    .auth-btn:active { transform: scale(0.97); }

    .auth-btn--outline {
      background: transparent;
      border: 1px solid rgba(247, 244, 238, 0.2);
      color: var(--bg-light);
      margin-top: 1rem;
    }
    .auth-btn--outline:hover { background: rgba(247, 244, 238, 0.05); box-shadow: none; }

    .auth-error {
      margin-top: 1.25rem;
      padding: 0.65rem 0.85rem;
      background: rgba(232, 120, 94, 0.1);
      border: 1px solid rgba(232, 120, 94, 0.2);
      border-radius: 8px;
      color: #E8785E;
      font-size: 0.78rem;
      text-align: center;
      width: 100%;
    }

    /* Loading */
    .loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-dark);
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    .loading-spinner {
      width: 24px;
      height: 24px;
      border: 2px solid var(--border-color);
      border-top-color: var(--primary-color);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 0.75rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Page content */
    #page-content { min-height: 100vh; }

    /* Section backgrounds */
    .section { padding: 3rem 2rem; }
    .section--dark { background: var(--bg-dark); color: var(--text-color); }
    .section--light { background: var(--bg-light); color: #1A2332; }
    .section--accent { background: var(--card-bg); color: var(--text-color); }

    .section-inner {
      max-width: 1100px;
      margin: 0 auto;
    }

    /* Element styles */
    .el-heading { margin-bottom: 0.75rem; font-weight: 600; }
    .el-heading--1 { font-size: 2.2rem; letter-spacing: -0.01em; color: var(--primary-color); }
    .el-heading--2 { font-size: 1.6rem; }
    .el-heading--3 { font-size: 1.15rem; letter-spacing: 0.06em; }
    .el-heading--4 { font-size: 0.95rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); }

    .el-paragraph { font-size: 0.9rem; line-height: 1.7; margin-bottom: 1rem; color: var(--text-muted); max-width: 680px; }
    .el-rich-text { font-size: 0.9rem; line-height: 1.7; margin-bottom: 1rem; }
    .el-rich-text h1, .el-rich-text h2, .el-rich-text h3 { margin: 1.5rem 0 0.75rem; }
    .el-rich-text p { margin-bottom: 0.75rem; }

    .el-image { max-width: 100%; height: auto; border-radius: var(--border-radius); margin-bottom: 1rem; }

    .el-button {
      display: inline-block;
      padding: 0.7rem 1.6rem;
      border-radius: 8px;
      font-family: var(--font-family);
      font-size: 0.85rem;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      margin-bottom: 1rem;
    }
    .el-button--primary { background: var(--accent-color); color: #1A2332; }
    .el-button--primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(203, 169, 81, 0.3); }
    .el-button--outline { background: transparent; border: 1px solid var(--text-muted); color: var(--text-color); }

    .el-list { list-style: none; margin-bottom: 1rem; }
    .el-list li { padding: 0.4rem 0; padding-left: 1.2rem; position: relative; font-size: 0.88rem; color: var(--text-muted); }
    .el-list li::before { content: ''; position: absolute; left: 0; top: 0.75rem; width: 6px; height: 6px; border-radius: 50%; background: var(--primary-color); }

    .el-divider { border: none; border-top: 1px solid var(--border-color); margin: 2rem 0; }

    .el-metric {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius);
      padding: 1.15rem 1.25rem;
      margin-bottom: 1rem;
    }
    .el-metric__label { font-size: 0.68rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 0.35rem; }
    .el-metric__value { font-size: 1.6rem; font-weight: 700; color: var(--primary-color); }
    .el-metric__sub { font-size: 0.72rem; color: var(--text-muted); margin-top: 0.2rem; }

    .el-html-frame { width: 100%; border: none; min-height: 400px; border-radius: var(--border-radius); }

    /* Grid layout for metrics */
    .section--grid .section-inner {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
    }

    /* Sidebar-main layout */
    .section--sidebar-main .section-inner {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 2rem;
    }
    @media (max-width: 900px) {
      .section--sidebar-main .section-inner { grid-template-columns: 1fr; }
    }

    .hidden { display: none !important; }

    /* 404 */
    .not-found {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .not-found h1 { font-size: 4rem; color: var(--primary-color); margin-bottom: 1rem; }
    .not-found p { color: var(--text-muted); font-size: 0.9rem; }
  </style>
</head>
<body>
  <div id="auth-gate" class="auth-gate">
    <div class="auth-card">
      <h1 class="auth-title">JoyOS</h1>
      <p class="auth-sub" id="auth-sub">Loading...</p>
      <button class="auth-btn hidden" id="login-btn">
        <svg viewBox="0 0 24 24" width="18" height="18" style="flex-shrink:0"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        <span>Sign in with Google</span>
      </button>
      <div id="auth-error" class="auth-error hidden"></div>
      <button id="logout-btn" class="auth-btn auth-btn--outline hidden">Sign out</button>
    </div>
  </div>

  <div id="loading" class="loading hidden">
    <div class="loading-spinner"></div>
    <span>Loading page...</span>
  </div>

  <div id="page-content" class="hidden"></div>
  <div id="not-found" class="not-found hidden">
    <h1>404</h1>
    <p>Page not found</p>
  </div>
</body>
</html>
